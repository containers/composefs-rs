[package]
name = "composefs-oci"
version = "0.2.0"
edition = "2021"
rust-version = "1.82.0"
description = "Rust library for the composefs filesystem"
keywords = ["composefs"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/containers/composefs-rs"
readme = "README.md"
exclude = ["/.git*", "/examples/"]

[dependencies]
composefs = "0.2.0"
anyhow = { version = "1.0.87", default-features = false }
async-compression = { version = "0.4.0", default-features = false, features = ["tokio", "zstd", "gzip"] }
containers-image-proxy = { version = "0.7.1", default-features = false }
hex = { version = "0.4.0", default-features = false }
indicatif = { version = "0.17.0", default-features = false, features = ["tokio"] }
oci-spec = { version = "0.7.0", default-features = false }
rustix = { version = "1.0.0", features = ["fs"] }
sha2 = { version = "0.10.1", default-features = false }
tar = { version = "0.4.38", default-features = false }
tokio = { version = "1.24.2", features = ["rt-multi-thread"] }

[dev-dependencies]
insta = "1.42.2"
similar-asserts = "1.7.0"
test-with = { version = "0.14", default-features = false, features = ["executable", "runtime"] }
tokio-test = "0.4.4"
