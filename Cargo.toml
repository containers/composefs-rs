[workspace]
resolver = "2"
members = [
    "crates/cfsctl",
    "crates/composefs",
    "crates/composefs-boot",
    "crates/composefs-oci",
    "crates/composefs-setup-root",
]

# https://github.com/rust-lang/cargo/issues/7290
default-run = 'cfsctl'

[profile.dev.package.sha2]
# this is *really* slow otherwise
opt-level = 3

[patch.crates-io]
composefs = { path = "crates/composefs" }
composefs-oci = { path = "crates/composefs-oci" }
composefs-boot = { path = "crates/composefs-boot" }
